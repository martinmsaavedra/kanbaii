<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0a0a0b" rx="6"/>

  <!-- Three vertical columns representing Kanban lanes -->
  <rect x="6" y="10" width="5" height="12" fill="#6366f1" rx="1.5"/>
  <rect x="13.5" y="8" width="5" height="16" fill="#818cf8" rx="1.5"/>
  <rect x="21" y="11" width="5" height="10" fill="#6366f1" rx="1.5"/>

  <!-- Subtle highlights for depth -->
  <rect x="6" y="10" width="5" height="3" fill="#818cf8" rx="1.5" opacity="0.5"/>
  <rect x="13.5" y="8" width="5" height="4" fill="#a5b4fc" rx="1.5" opacity="0.4"/>
  <rect x="21" y="11" width="5" height="2.5" fill="#818cf8" rx="1.5" opacity="0.5"/>
</svg>
