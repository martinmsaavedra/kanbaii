name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (server)
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: TypeScript check (CLI)
        run: npx tsc -p tsconfig.cli.json --noEmit

      - name: Run tests
        run: npx vitest run

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build server + CLI
        run: |
          npx tsc -p tsconfig.cli.json
          mkdir -p dist/server/mcp && cp src/server/mcp/*.js dist/server/mcp/

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Verify dist structure
        run: |
          test -f dist/cli/index.js
          test -f dist/server/index.js
          test -f frontend/out/index.html
