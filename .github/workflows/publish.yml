name: Publish to npm

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure unpublished version
        id: version_check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          while npm view kanbaii@$PKG_VERSION version 2>/dev/null; do
            echo "⚠️ Version $PKG_VERSION already published — bumping patch"
            npm version patch --no-git-tag-version
            PKG_VERSION=$(node -p "require('./package.json').version")
          done
          echo "version=$PKG_VERSION" >> $GITHUB_OUTPUT
          echo "✓ Will publish kanbaii@$PKG_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: npm ci
      - run: npx tsc -p tsconfig.build.json
      - name: Copy MCP server (plain JS not compiled by tsc)
        run: mkdir -p dist/server/mcp && cp src/server/mcp/*.js dist/server/mcp/
      - run: cd frontend && npm ci && npm run build
      - run: rm -rf dashboard && cp -r frontend/out dashboard

      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: echo "✅ Published kanbaii@${{ steps.version_check.outputs.version }}"
